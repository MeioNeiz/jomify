name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    needs: []
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/jomify
            git pull --ff-only
            ~/.bun/bin/bun install --frozen-lockfile
            # Sync slash commands to Discord before restart so the new
            # bot never serves a command the registry doesn't know
            # about. PUT is idempotent and cheap, so it's fine to run
            # every deploy even when command data hasn't changed.
            ~/.bun/bin/bun run register
            sudo systemctl restart jomify
            sudo systemctl restart jomify-admin || true
